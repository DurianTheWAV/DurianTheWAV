name: Waka Readme

on:
  push:
  schedule:
    # Runs at 12am IST
    - cron: "0 */1 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Readme with Metrics
    runs-on: ubuntu-latest
    steps:
      - uses: anmol098/waka-readme-stats@v4
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY}}
          GH_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}